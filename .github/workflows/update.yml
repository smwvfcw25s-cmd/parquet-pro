name: Actualizar datos

# Ejecuta el actualizador cada 3 horas (y permite lanzarlo a mano desde la pestaña Actions)
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar data.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Opcional: descomenta si conectas API-Sports para clasificaciones
          # APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
        run: python scripts/update_data.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "parquet-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data.json
          if git diff --staged --quiet; then
            echo "Sin cambios en data.json"
          else
            git commit -m "datos: actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
